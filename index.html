<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Freunde-Chat</title>

<style>

* {
box-sizing:border-box;
}


body {

font-family:'Segoe UI',Arial,sans-serif;

background:#1e1e2f;

color:white;

margin:0;

height:100vh;

display:flex;

flex-direction:column;

}



header {

background:#27293d;

padding:16px;

text-align:center;

font-size:1.4em;

font-weight:bold;

}



#chat {

flex:1;

overflow-y:auto;

padding:16px;

}



.msg {

background:#2d2f45;

padding:10px;

border-radius:10px;

margin-bottom:10px;

display:flex;

align-items:center;

gap:10px;

}



.avatar {

width:45px;

height:45px;

border-radius:50%;

object-fit:cover;

}



.messageContent {

display:flex;

flex-direction:column;

}



.name {

color:#7aa2ff;

font-weight:bold;

}



.time {

font-size:0.75em;

color:#999;

}



#inputBar {

display:flex;

gap:8px;

padding:12px;

background:#27293d;

}



#messageInput {

flex:1;

padding:10px;

border-radius:8px;

border:none;

}



button {

padding:10px 20px;

border:none;

border-radius:8px;

background:#7aa2ff;

font-weight:bold;

cursor:pointer;

}



#nameOverlay {

position:fixed;

inset:0;

background:rgba(0,0,0,.8);

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

gap:12px;

z-index:10;

}



#nameOverlay input {

width:230px;

padding:10px;

border-radius:8px;

border:none;

text-align:center;

}



#avatarInput {

color:white;

}


</style>

</head>


<body>



<div id="nameOverlay">


<h2>💬 Freunde-Chat</h2>


<input id="nameInput" placeholder="Benutzername">


<input id="passwordInput" type="password" placeholder="Passwort">


<input id="avatarInput" type="file" accept="image/*">


<button id="registerBtn">
Registrieren
</button>


<button id="loginBtn">
Einloggen
</button>


</div>



<header>
💬 Freunde-Chat
</header>



<div id="chat"></div>



<div id="inputBar">


<input id="messageInput" placeholder="Nachricht schreiben..." maxlength="500">


<button id="sendBtn">
Senden
</button>


</div>



<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>



<script>
const firebaseConfig = {

apiKey: "AIzaSyDQ2pB1Tylh8B4OxTT0AoteA0DOmhFl96k",

authDomain: "freunde-chat-e2a5f.firebaseapp.com",

databaseURL: "https://freunde-chat-e2a5f-default-rtdb.firebaseio.com",

projectId: "freunde-chat-e2a5f",

storageBucket: "freunde-chat-e2a5f.firebasestorage.app",

messagingSenderId: "21516870361",

appId: "1:21516870361:web:6725720e54444e8a4054c8"

};



firebase.initializeApp(firebaseConfig);



const db = firebase.database();

const storage = firebase.storage();



const messagesRef = db.ref("messages");

const usersRef = db.ref("users");



let username = "";

let avatarUrl = "";



const defaultAvatar =
"https://cdn-icons-png.flaticon.com/512/149/149071.png";



const overlay = document.getElementById("nameOverlay");

const nameInput = document.getElementById("nameInput");

const passwordInput = document.getElementById("passwordInput");

const avatarInput = document.getElementById("avatarInput");

const registerBtn = document.getElementById("registerBtn");

const loginBtn = document.getElementById("loginBtn");

const chat = document.getElementById("chat");

const messageInput = document.getElementById("messageInput");

const sendBtn = document.getElementById("sendBtn");






// REGISTRIEREN


registerBtn.onclick = async function(){


let name = nameInput.value.trim();

let password = passwordInput.value.trim();

let file = avatarInput.files[0];



if(!name || !password){

alert("Bitte Benutzername und Passwort eingeben!");

return;

}



usersRef.child(name).once("value", async snap=>{


if(snap.exists()){


alert("Dieser Benutzername ist schon vergeben!");

return;


}



let avatar = defaultAvatar;



// wenn Bild ausgewählt wurde

if(file){


let upload = storage.ref("avatars/" + name);


await upload.put(file);


avatar = await upload.getDownloadURL();


}




usersRef.child(name).set({

password:password,

avatar:avatar

});



username=name;

avatarUrl=avatar;



localStorage.setItem("chatUsername",username);



overlay.style.display="none";



alert("Account erstellt!");



});



};







// LOGIN


loginBtn.onclick=function(){


let name=nameInput.value.trim();

let password=passwordInput.value.trim();



if(!name || !password){

alert("Bitte alles ausfüllen!");

return;

}



usersRef.child(name).once("value",snap=>{


if(!snap.exists()){


alert("Benutzer existiert nicht!");

return;


}



let user=snap.val();



if(user.password === password){


username=name;

avatarUrl=user.avatar || defaultAvatar;


localStorage.setItem("chatUsername",username);



overlay.style.display="none";



}else{


alert("Falsches Passwort!");

}


});



};

// NACHRICHT SENDEN

function sendMessage(){


let text = messageInput.value.trim();



if(!text){

return;

}



if(!username){

alert("Bitte erst einloggen!");

return;

}



messagesRef.push({

name: username,

text: text,

avatar: avatarUrl || defaultAvatar,

time: Date.now()

});



messageInput.value="";


}



sendBtn.onclick = sendMessage;



messageInput.addEventListener("keydown", function(e){


if(e.key === "Enter"){

sendMessage();

}


});







// NACHRICHTEN LADEN


messagesRef.limitToLast(100).on("child_added", snapshot=>{


let msg = snapshot.val();



let div = document.createElement("div");


div.className="msg";



let date = new Date(msg.time);



div.innerHTML = `

<img class="avatar" src="${msg.avatar || defaultAvatar}">


<div class="messageContent">


<span class="name">

${escapeHtml(msg.name)}

</span>


<span>

${escapeHtml(msg.text)}

</span>


<span class="time">

${date.toLocaleTimeString("de-DE",{
hour:"2-digit",
minute:"2-digit"
})}

</span>


</div>

`;



chat.appendChild(div);



chat.scrollTop = chat.scrollHeight;



});







function escapeHtml(str){

let d=document.createElement("div");

d.innerText=str;

return d.innerHTML;

}



</script>


</body>

</html>
