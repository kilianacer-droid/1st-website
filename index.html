<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freunde-Chat</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1e1e2f;
    color: #eee;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    background: #27293d;
    padding: 16px;
    text-align: center;
    font-size: 1.4em;
    font-weight: bold;
    border-bottom: 2px solid #3d3f5c;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg {
    background: #2d2f45;
    padding: 8px 12px;
    border-radius: 10px;
    max-width: 70%;
    align-self: flex-start;
    word-wrap: break-word;
  }
  .msg .name {
    font-weight: bold;
    color: #7aa2ff;
    margin-right: 6px;
  }
  .msg .time {
    font-size: 0.75em;
    color: #999;
    margin-left: 6px;
  }
  #inputBar {
    display: flex;
    padding: 12px;
    background: #27293d;
    border-top: 2px solid #3d3f5c;
    gap: 8px;
  }
  #messageInput {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 1em;
  }
  #sendBtn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #7aa2ff;
    color: #1e1e2f;
    font-weight: bold;
    cursor: pointer;
  }
  #sendBtn:hover { background: #5c85e0; }

  /* Namens-Overlay */
  #nameOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    z-index: 10;
  }
  #nameOverlay input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 1em;
    width: 220px;
    text-align: center;
  }
  #nameOverlay button {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    background: #7aa2ff;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="nameOverlay">
  <h2>Wie heißt du?</h2>
  <input id="nameInput" type="text" placeholder="Dein Name" maxlength="20">
  <button id="nameConfirm">Chat betreten</button>
</div>

<header>💬 Freunde-Chat</header>
<div id="chat"></div>
<div id="inputBar">
  <input id="messageInput" type="text" placeholder="Nachricht schreiben..." maxlength="500">
  <button id="sendBtn">Senden</button>
</div>

<!-- Firebase SDK (kostenlos, keine eigene Server-Installation nötig) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
  // ============================================
  // HIER DEINE EIGENE FIREBASE-KONFIGURATION EINFÜGEN
  // ============================================
  const firebaseConfig = {
    apiKey: "DEIN_API_KEY",
    authDomain: "DEIN_PROJEKT.firebaseapp.com",
    databaseURL: "https://DEIN_PROJEKT-default-rtdb.firebaseio.com",
    projectId: "DEIN_PROJEKT",
    storageBucket: "DEIN_PROJEKT.appspot.com",
    messagingSenderId: "XXXXXXXXX",
    appId: "1:XXXXXXXXX:web:XXXXXXXXXXXXXXXX"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const messagesRef = db.ref("messages");

  let username = "";

  const nameOverlay = document.getElementById("nameOverlay");
  const nameInput = document.getElementById("nameInput");
  const nameConfirm = document.getElementById("nameConfirm");
  const chat = document.getElementById("chat");
  const messageInput = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");

  const savedName = localStorage.getItem("chatUsername");
  if (savedName) {
    nameInput.value = savedName;
  }

  nameConfirm.addEventListener("click", enterChat);
  nameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") enterChat();
  });

  function enterChat() {
    const val = nameInput.value.trim();
    if (!val) {
      alert("Bitte gib einen Namen ein!");
      return;
    }
    username = val;
    localStorage.setItem("chatUsername", username);
    nameOverlay.style.display = "none";
    messageInput.focus();
  }

  function sendMessage() {
    const text = messageInput.value.trim();
    if (!text || !username) return;
    messagesRef.push({
      name: username,
      text: text,
      time: Date.now()
    });
    messageInput.value = "";
  }

  sendBtn.addEventListener("click", sendMessage);
  messageInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  messagesRef.limitToLast(100).on("child_added", (snapshot) => {
    const msg = snapshot.val();
    const div = document.createElement("div");
    div.className = "msg";
    const date = new Date(msg.time);
    const timeStr = date.toLocaleTimeString("de-DE", {hour: '2-digit', minute:'2-digit'});
    div.innerHTML = `<span class="name">${escapeHtml(msg.name)}</span>${escapeHtml(msg.text)}<span class="time">${timeStr}</span>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });

  function escapeHtml(str) {
    const d = document.createElement("div");
    d.innerText = str;
    return d.innerHTML;
  }
</script>

</body>
</html>
