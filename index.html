<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <style>
        #chat {
            width: 300px;
            height: 300px;
            border: 1px solid black;
            overflow-y: auto;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h2>Mein Chat</h2>

<div id="chat"></div>

<input type="text" id="message" placeholder="Nachricht eingeben">
<button onclick="sendMessage()">Senden</button>

<script>
function sendMessage() {
    const input = document.getElementById("message");
    const chat = document.getElementById("chat");

    if (input.value.trim() !== "") {
        chat.innerHTML += "<p>" + input.value + "</p>";
        input.value = "";
    }
}
</script>

</body>
</html>
